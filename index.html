<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranking Comercial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* CSS ANTIGO MANTIDO INTEGRALMENTE */
    :root {
      --bg:        #07080d;
      --surface:   #0d0f18;
      --border:    rgba(255,255,255,0.07);
      --gold:      #c9a84c;
      --gold-dim:  rgba(201,168,76,0.15);
      --silver:    #8fa3b8;
      --bronze:    #a87c50;
      --green:     #22c55e;
      --blue:      #3b82f6;
      --text:      rgba(255,255,255,0.88);
      --muted:     rgba(255, 255, 255, 0.774);
      --faint:     rgba(255,255,255,0.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 0;
    }

    .header {
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 32px;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }

    .header-left { display: flex; align-items: center; gap: 14px; }

    .logo {
      width: 34px; height: 34px; border-radius: 9px;
      background: linear-gradient(135deg, #1a1508, #c9a84c22);
      border: 1px solid rgba(201,168,76,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 800; color: var(--gold);
      letter-spacing: -1px;
    }

    .header-info h1 {
      font-size: 15px; font-weight: 700;
      color: var(--text); letter-spacing: -0.3px;
    }
    .header-info p {
      font-size: 11px; color: var(--muted);
      font-family: 'DM Mono', monospace; margin-top: 1px;
    }

    .header-right { display: flex; align-items: center; gap: 10px; }

    .live-pill {
      display: flex; align-items: center; gap: 6px;
      background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: 100px; padding: 5px 12px;
      font-size: 11px; color: var(--green);
      font-family: 'DM Mono', monospace;
    }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green);
      animation: blink 1.8s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.7)} }

    .btn-metas {
      background: var(--faint);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px; border-radius: 8px;
      font-size: 12px; font-family: 'Syne', sans-serif;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-metas:hover { background: rgba(201,168,76,0.08); border-color: rgba(201,168,76,0.3); color: var(--gold); }

    .grid {
      position: relative; z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 20px 32px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 22px;
      transition: border-color 0.3s;
    }
    .panel:hover { border-color: rgba(255,255,255,0.12); }

    .panel-eyebrow {
      font-size: 10px; font-weight: 600;
      letter-spacing: 1.8px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 4px;
      font-family: 'DM Mono', monospace;
    }
    .panel-title {
      font-size: 17px; font-weight: 700;
      color: var(--text); margin-bottom: 20px;
      letter-spacing: -0.4px;
    }

    .podium {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      align-items: end;
    }

    .p-card {
      border-radius: 12px;
      padding: 16px 12px 14px;
      text-align: center;
      position: relative;
      transition: transform 0.2s;
    }
    .p-card:hover { transform: translateY(-2px); }

    .p-card.rank-1 {
      background: linear-gradient(160deg, #1c1608 0%, #251c0c 100%);
      border: 1px solid rgba(201,168,76,0.3);
      order: 2;
    }
    .p-card.rank-2 {
      background: linear-gradient(160deg, #0f1219 0%, #161d27 100%);
      border: 1px solid rgba(143,163,184,0.18);
      order: 1;
    }
    .p-card.rank-3 {
      background: linear-gradient(160deg, #150e08 0%, #1e1510 100%);
      border: 1px solid rgba(168,124,80,0.18);
      order: 3;
    }

    .p-badge {
      position: absolute; top: 8px; right: 10px;
      font-size: 10px; font-weight: 600;
      font-family: 'DM Mono', monospace;
    }
    .rank-1 .p-badge { color: var(--gold); }
    .rank-2 .p-badge { color: var(--silver); }
    .rank-3 .p-badge { color: var(--bronze); }

    .p-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
      margin: 0 auto 10px;
    }
    .rank-1 .p-avatar { background: rgba(201,168,76,0.12); color: var(--gold); border: 1.5px solid rgba(201,168,76,0.35); }
    .rank-2 .p-avatar { background: rgba(143,163,184,0.08); color: var(--silver); border: 1.5px solid rgba(143,163,184,0.25); }
    .rank-3 .p-avatar { background: rgba(168,124,80,0.08); color: var(--bronze); border: 1.5px solid rgba(168,124,80,0.25); }

    .p-name {
      font-size: 12px; font-weight: 600;
      color: var(--text); margin-bottom: 5px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .p-value {
      font-size: 13px; font-weight: 700;
      font-family: 'DM Mono', monospace;
    }
    .rank-1 .p-value { color: var(--gold); }
    .rank-2 .p-value { color: var(--silver); }
    .rank-3 .p-value { color: var(--bronze); }

    .p-sublabel {
      font-size: 10px; color: var(--muted);
      margin-top: 2px; font-family: 'DM Mono', monospace;
    }

    .progress-grid {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .prog-head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 8px;
    }
    .prog-label { font-size: 13px; font-weight: 600; color: var(--text); }
    .prog-pct {
      font-size: 18px; font-weight: 700;
      font-family: 'DM Mono', monospace;
    }
    .prog-pct.c-gold  { color: var(--gold); }
    .prog-pct.c-blue  { color: var(--blue); }
    .prog-pct.c-green { color: var(--green); }

    .prog-vals {
      font-size: 11px; color: var(--muted);
      font-family: 'DM Mono', monospace; margin-top: 1px;
    }

    .prog-track {
      height: 6px; background: var(--faint);
      border-radius: 100px; overflow: hidden;
    }
    .prog-fill {
      height: 100%; border-radius: 100px;
      transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
      width: 0%;
    }
    .prog-fill.c-gold  { background: linear-gradient(90deg, #9a7820, #e2b84a); }
    .prog-fill.c-blue  { background: linear-gradient(90deg, #1d4ed8, #60a5fa); }
    .prog-fill.c-green { background: linear-gradient(90deg, #15803d, #4ade80); }

    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: #101118;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 28px;
      width: 440px; max-width: 92vw;
    }

    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
    .modal-desc { font-size: 12px; color: var(--muted); margin-bottom: 22px; font-family: 'DM Mono', monospace; }

    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: 11px; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      background: var(--faint);
      border: 1px solid var(--border);
      border-radius: 9px; padding: 10px 14px;
      color: var(--text); font-size: 13px;
      font-family: 'DM Mono', monospace;
      outline: none;
    }
    .field input:focus { border-color: rgba(201,168,76,0.45); }

    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-save {
      flex: 1; background: var(--gold); border: none;
      color: #07080d; padding: 11px;
      border-radius: 9px; font-size: 13px; font-weight: 700;
      cursor: pointer;
    }
    .btn-cancel {
      background: var(--faint); border: 1px solid var(--border);
      color: var(--muted); padding: 11px 16px;
      border-radius: 9px; font-size: 13px;
      cursor: pointer;
    }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #101118; border: 1px solid rgba(34,197,94,0.3);
      color: var(--green); border-radius: 10px;
      padding: 12px 18px; font-size: 12px;
      font-family: 'DM Mono', monospace;
      z-index: 300;
      opacity: 0; transform: translateY(8px);
      transition: all 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo">RC</div>
    <div class="header-info">
      <h1>Ranking Comercial</h1>
      <p id="last-update">Carregando...</p>
    </div>
  </div>
  <div class="header-right">
    <div class="live-pill"><div class="live-dot"></div>Ao vivo</div>
    <button class="btn-metas" onclick="openModal()">⚙ Metas</button>
  </div>
</header>

<div class="grid">
  <div class="panel">
    <div class="panel-eyebrow">Ranking Mensal</div>
    <div class="panel-title">Top Vendedores</div>
    <div class="podium" id="pod-mensal"></div>
  </div>

  <div class="panel">
    <div class="panel-eyebrow">Campanha Semanal</div>
    <div class="panel-title">Maiores Entradas</div>
    <div class="podium" id="pod-semanal"></div>
  </div>

  <div class="panel">
    <div class="panel-eyebrow">Campanha Mensal</div>
    <div class="panel-title">Top Equipes</div>
    <div class="podium" id="pod-equipes"></div>
  </div>

  <div class="panel">
    <div class="panel-eyebrow">Ranking Mensal</div>
    <div class="panel-title">Maiores Entradas Mensais</div>
    <div class="podium" id="pod-entradas-mensais"></div>
  </div>

  <div class="panel">
    <div class="panel-eyebrow">Performance</div>
    <div class="panel-title">Progresso das Metas</div>
    <div class="progress-grid" id="progress-wrap"></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title" style="font-weight:700; margin-bottom:10px;">Definir Metas</div>
    <div class="field"><label>Meta de Vendas Mensais (R$)</label><input type="number" id="inp-vendas"></div>
    <div class="field"><label>Meta de Entradas Mensais (R$)</label><input type="number" id="inp-entradas-mensais"></div>
    <div class="field"><label>Meta de Entradas Semanais (R$)</label><input type="number" id="inp-entradas"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" id="btn-save" onclick="saveMetas()">Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = { sheets: "/api/sheets", metas: "/api/metas" };
const GID = { mensal: "0" };

let metas = { meta_vendas: 0, meta_entradas: 0, meta_entradas_mensais: 0 };
let dados = { mensal: [], semanal: [], equipes: [], entradasMensais: [] };
let totais = { vendas: 0, entradas: 0, entradasMensais: 0 };

async function init() {
  await loadMetas();
  await loadSheets();
  setInterval(loadSheets, 30000);
}

async function loadMetas() {
  try {
    const res = await fetch(API.metas);
    const body = await res.json();
    if (body.ok) metas = body.data;
  } catch (e) { console.warn("Erro ao carregar metas:", e); }
}

async function loadSheets() {
  try {
    const res = await fetch(`${API.sheets}?gid=${GID.mensal}&t=${Date.now()}`, { cache: 'no-store' });
    const body = await res.json();

    if (body.ok) {
      parseUnicaAba(body.data);
      render();
      document.getElementById("last-update").textContent = "Atualizado às " + new Date().toLocaleTimeString("pt-BR");
    }
  } catch (e) { console.error("Erro na sincronização:", e); }
}

function findKey(keys, search) {
  const s = search.toLowerCase();
  return keys.find(k => k.toLowerCase() === s) || keys.find(k => k.toLowerCase().includes(s)) || null;
}

function parseUnicaAba(rows) {
  if (!rows || rows.length === 0) return;

  const keys = Object.keys(rows[0]);
  const clean = rows.filter(r => Object.values(r).some(v => v && v.trim() !== "" && v !== "#N/D"));

  // MAPEAMENTO DINÂMICO
  const kVendedor = findKey(keys, "vendedor");
  const kValidos = findKey(keys, "valores válidos");
  const kPontos = findKey(keys, "pontos");
  const kEntradaMensal = keys.find(k => k.toLowerCase() === "entrada"); 
  const kEntradaSemanal = keys.find(k => k.toLowerCase() === "entrada_2") || kEntradaMensal;
  const kEquipe = findKey(keys, "equipe");
  const kVendasValidasEquipe = findKey(keys, "vendas válidas"); 

  /* 1. RANKING MENSAL (Vendedores) */
  dados.mensal = clean.map(r => ({
    nome:    r[kVendedor]?.trim() || "—",
    vendas:  Number(r[kPontos]) || 0,
    validos: parseMoeda(r[kValidos]), 
  })).filter(r => r.validos > 0).sort((a, b) => b.validos - a.validos).slice(0, 3);

  /* 2. CAMPANHA MENSAL (EQUIPES) */
  dados.equipes = clean.map(r => ({
    equipe: r[kEquipe]?.trim() || "—",
    vendas: parseMoeda(r[kVendasValidasEquipe]), 
  })).filter(r => r.vendas > 0).sort((a, b) => b.vendas - a.vendas).slice(0, 3);

  /* 3. CAMPANHA SEMANAL */
  const kSucesso = findKey(keys, "sucesso");
  dados.semanal = clean.map(r => ({
    equipe:  r[keys.find(k => k.toLowerCase() === "equipe_2") || kEquipe]?.trim() || "—",
    entrada: parseMoeda(r[kEntradaSemanal]),
    sucesso: (r[kSucesso] ?? "").trim(),
  })).filter(r => r.entrada > 0).sort((a, b) => b.entrada - a.entrada).slice(0, 3);

  /* 4. MAIORES ENTRADAS MENSAIS (NOVO) */
  dados.entradasMensais = clean.map(r => ({
    nome:    r[kVendedor]?.trim() || "—",
    entrada: parseMoeda(r[kEntradaMensal]),
  })).filter(r => r.entrada > 0).sort((a, b) => b.entrada - a.entrada).slice(0, 3);

  // TOTAIS PARA AS 3 BARRAS
  totais.vendas = clean.reduce((s, r) => s + parseMoeda(r[kValidos]), 0);
  totais.entradasMensais = clean.reduce((s, r) => s + parseMoeda(r[kEntradaMensal]), 0);
  totais.entradas = clean.reduce((s, r) => s + parseMoeda(r[kEntradaSemanal]), 0);
}

function parseMoeda(v) {
  if (!v) return 0;
  return Number(String(v).replace(/[R$\s.]/g, "").replace(",", ".")) || 0;
}

function render() {
  renderPodium("pod-mensal",           dados.mensal,          "mensal");
  renderPodium("pod-semanal",          dados.semanal,         "semanal");
  renderPodium("pod-equipes",          dados.equipes,         "equipes");
  renderPodium("pod-entradas-mensais", dados.entradasMensais, "entradas-mensais");
  renderProgress();
}

function renderPodium(id, items, tipo) {
  const el = document.getElementById(id);
  if (!items || items.length === 0) {
    el.innerHTML = `<div style="padding:20px; text-align:center; color:var(--muted)">Sem dados</div>`;
    return;
  }

  const ordered = [items[1], items[0], items[2]].filter(Boolean);
  const rankClass = ["rank-2", "rank-1", "rank-3"];

  el.innerHTML = ordered.map((item, vi) => {
    const badge = vi === 1 ? "#1" : vi === 0 ? "#2" : "#3";
    const label = item.nome || item.equipe;
    const initials = label.split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();
    
    let valor = tipo === "mensal" ? fmt(item.validos) : 
                (tipo === "semanal" || tipo === "entradas-mensais" ? fmt(item.entrada) : fmt(item.vendas));
    let sublabel = tipo === "mensal" ? `${item.vendas} vendas` : 
                   (tipo === "semanal" ? (item.sucesso === "Sim" ? "✓ Meta" : "Em progresso") : "");
    
    return `
      <div class="p-card ${rankClass[vi]}">
        <span class="p-badge">${badge}</span>
        <div class="p-avatar">${initials}</div>
        <div class="p-name">${label}</div>
        <div class="p-value">${valor}</div>
        <div class="p-sublabel">${sublabel}</div>
      </div>`;
  }).join("");
}

function renderProgress() {
  const wrap = document.getElementById("progress-wrap");
  const items = [
    { label: "Vendas Mensais",    atual: totais.vendas,          meta: metas.meta_vendas,           cor: "c-gold" },
    { label: "Entradas Mensais",   atual: totais.entradasMensais, meta: metas.meta_entradas_mensais,  cor: "c-green" },
    { label: "Entradas Semanais", atual: totais.entradas,        meta: metas.meta_entradas,         cor: "c-blue" }
  ];

  wrap.innerHTML = items.map(({ label, atual, meta, cor }) => {
    const pct = meta > 0 ? Math.min(100, Math.round((atual / meta) * 100)) : 0;
    return `
      <div class="prog-item">
        <div class="prog-head">
          <span class="prog-label">${label}</span>
          <div class="prog-right">
            <div class="prog-pct ${cor}">${pct}%</div>
            <div class="prog-vals">${fmt(atual)} / ${fmt(meta)}</div>
          </div>
        </div>
        <div class="prog-track"><div class="prog-fill ${cor}" style="width:${pct}%"></div></div>
      </div>`;
  }).join("");
}

function openModal() {
  document.getElementById("inp-vendas").value = metas.meta_vendas || "";
  document.getElementById("inp-entradas-mensais").value = metas.meta_entradas_mensais || "";
  document.getElementById("inp-entradas").value = metas.meta_entradas || "";
  document.getElementById("overlay").classList.add("open");
}

function closeModal() { document.getElementById("overlay").classList.remove("open"); }

async function saveMetas() {
  const btn = document.getElementById("btn-save");
  btn.disabled = true;
  btn.textContent = "Salvando...";
  const payload = {
    meta_vendas: Number(document.getElementById("inp-vendas").value) || 0,
    meta_entradas_mensais: Number(document.getElementById("inp-entradas-mensais").value) || 0,
    meta_entradas: Number(document.getElementById("inp-entradas").value) || 0,
  };
  try {
    const res = await fetch(API.metas, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
    if ((await res.json()).ok) { metas = payload; closeModal(); renderProgress(); showToast("✓ Metas salvas"); }
  } catch (e) { showToast("✗ Erro ao salvar", true); }
  finally { btn.disabled = false; btn.textContent = "Salvar"; }
}

function fmt(v) { return (v || 0).toLocaleString("pt-BR", { style: "currency", currency: "BRL", minimumFractionDigits: 0 }); }
function showToast(msg) { const t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 3000); }

init();
</script>
</body>
</html>
