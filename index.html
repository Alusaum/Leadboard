<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranking Comercial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #07080d;
      --surface:   #0d0f18;
      --border:    rgba(255,255,255,0.07);
      --gold:      #c9a84c;
      --gold-dim:  rgba(201,168,76,0.15);
      --silver:    #8fa3b8;
      --bronze:    #a87c50;
      --green:     #22c55e;
      --blue:      #3b82f6;
      --text:      rgba(255,255,255,0.88);
      --muted:     rgba(255, 255, 255, 0.774);
      --faint:     rgba(255,255,255,0.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── noise overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 0;
    }

    /* ── header ── */
    .header {
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 32px;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }

    .header-left { display: flex; align-items: center; gap: 14px; }

    .logo {
      width: 34px; height: 34px; border-radius: 9px;
      background: linear-gradient(135deg, #1a1508, #c9a84c22);
      border: 1px solid rgba(201,168,76,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 800; color: var(--gold);
      letter-spacing: -1px;
    }

    .header-info h1 {
      font-size: 15px; font-weight: 700;
      color: var(--text); letter-spacing: -0.3px;
    }
    .header-info p {
      font-size: 11px; color: var(--muted);
      font-family: 'DM Mono', monospace; margin-top: 1px;
    }

    .header-right { display: flex; align-items: center; gap: 10px; }

    .live-pill {
      display: flex; align-items: center; gap: 6px;
      background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: 100px; padding: 5px 12px;
      font-size: 11px; color: var(--green);
      font-family: 'DM Mono', monospace;
    }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green);
      animation: blink 1.8s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.7)} }

    .btn-metas {
      background: var(--faint);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px; border-radius: 8px;
      font-size: 12px; font-family: 'Syne', sans-serif;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-metas:hover { background: rgba(201,168,76,0.08); border-color: rgba(201,168,76,0.3); color: var(--gold); }

    /* ── grid ── */
    .grid {
      position: relative; z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 16px;
      padding: 20px 32px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 22px;
      transition: border-color 0.3s;
    }
    .panel:hover { border-color: rgba(255,255,255,0.12); }

    .panel-eyebrow {
      font-size: 10px; font-weight: 600;
      letter-spacing: 1.8px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 4px;
      font-family: 'DM Mono', monospace;
    }
    .panel-title {
      font-size: 17px; font-weight: 700;
      color: var(--text); margin-bottom: 20px;
      letter-spacing: -0.4px;
    }

    /* ── podium ── */
    .podium {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      align-items: end;
    }

    .p-card {
      border-radius: 12px;
      padding: 16px 12px 14px;
      text-align: center;
      position: relative;
      transition: transform 0.2s;
    }
    .p-card:hover { transform: translateY(-2px); }

    .p-card.rank-1 {
      background: linear-gradient(160deg, #1c1608 0%, #251c0c 100%);
      border: 1px solid rgba(201,168,76,0.3);
      order: 2;
    }
    .p-card.rank-2 {
      background: linear-gradient(160deg, #0f1219 0%, #161d27 100%);
      border: 1px solid rgba(143,163,184,0.18);
      order: 1; margin-bottom: 0;
    }
    .p-card.rank-3 {
      background: linear-gradient(160deg, #150e08 0%, #1e1510 100%);
      border: 1px solid rgba(168,124,80,0.18);
      order: 3; margin-bottom: 0;
    }

    .p-badge {
      position: absolute; top: 8px; right: 10px;
      font-size: 10px; font-weight: 600;
      font-family: 'DM Mono', monospace;
    }
    .rank-1 .p-badge { color: var(--gold); }
    .rank-2 .p-badge { color: var(--silver); }
    .rank-3 .p-badge { color: var(--bronze); }

    .p-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
      margin: 0 auto 10px;
    }
    .rank-1 .p-avatar { background: rgba(201,168,76,0.12); color: var(--gold); border: 1.5px solid rgba(201,168,76,0.35); }
    .rank-2 .p-avatar { background: rgba(143,163,184,0.08); color: var(--silver); border: 1.5px solid rgba(143,163,184,0.25); }
    .rank-3 .p-avatar { background: rgba(168,124,80,0.08); color: var(--bronze); border: 1.5px solid rgba(168,124,80,0.25); }

    .p-name {
      font-size: 12px; font-weight: 600;
      color: var(--text); margin-bottom: 5px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .p-value {
      font-size: 13px; font-weight: 700;
      font-family: 'DM Mono', monospace;
    }
    .rank-1 .p-value { color: var(--gold); }
    .rank-2 .p-value { color: var(--silver); }
    .rank-3 .p-value { color: var(--bronze); }

    .p-sublabel {
      font-size: 10px; color: var(--muted);
      margin-top: 2px; font-family: 'DM Mono', monospace;
    }

    /* ── progress panel ── */
    .progress-grid {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .prog-item {}

    .prog-head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 8px;
    }
    .prog-label { font-size: 13px; font-weight: 600; color: var(--text); }
    .prog-right { text-align: right; }
    .prog-pct {
      font-size: 18px; font-weight: 700;
      font-family: 'DM Mono', monospace;
    }
    .prog-pct.c-gold  { color: var(--gold); }
    .prog-pct.c-blue  { color: var(--blue); }
    .prog-pct.c-green { color: var(--green); }

    .prog-vals {
      font-size: 11px; color: var(--muted);
      font-family: 'DM Mono', monospace; margin-top: 1px;
    }

    .prog-track {
      height: 6px; background: var(--faint);
      border-radius: 100px; overflow: hidden;
    }
    .prog-fill {
      height: 100%; border-radius: 100px;
      transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
      width: 0%;
    }
    .prog-fill.c-gold  { background: linear-gradient(90deg, #9a7820, #e2b84a); }
    .prog-fill.c-blue  { background: linear-gradient(90deg, #1d4ed8, #60a5fa); }
    .prog-fill.c-green { background: linear-gradient(90deg, #15803d, #4ade80); }

    /* ── loading skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, var(--faint) 25%, rgba(255,255,255,0.09) 50%, var(--faint) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── error state ── */
    .error-msg {
      text-align: center; padding: 28px;
      color: rgba(255,80,80,0.7); font-size: 12px;
      font-family: 'DM Mono', monospace;
    }

    /* ── modal ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: #101118;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 28px;
      width: 440px; max-width: 92vw;
      transform: translateY(8px);
      transition: transform 0.25s;
    }
    .overlay.open .modal { transform: translateY(0); }

    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
    .modal-desc {
      font-size: 12px; color: var(--muted);
      margin-bottom: 22px; line-height: 1.7;
      font-family: 'DM Mono', monospace;
    }

    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: 11px; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      background: var(--faint);
      border: 1px solid var(--border);
      border-radius: 9px; padding: 10px 14px;
      color: var(--text); font-size: 13px;
      font-family: 'DM Mono', monospace;
      outline: none; transition: border-color 0.2s;
    }
    .field input:focus { border-color: rgba(201,168,76,0.45); }

    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-save {
      flex: 1; background: var(--gold); border: none;
      color: #07080d; padding: 11px;
      border-radius: 9px; font-size: 13px; font-weight: 700;
      font-family: 'Syne', sans-serif;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-save:hover { background: #e2b84a; }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-cancel {
      background: var(--faint); border: 1px solid var(--border);
      color: var(--muted); padding: 11px 16px;
      border-radius: 9px; font-size: 13px;
      font-family: 'Syne', sans-serif;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-cancel:hover { background: rgba(255,255,255,0.07); }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #101118; border: 1px solid rgba(34,197,94,0.3);
      color: var(--green); border-radius: 10px;
      padding: 12px 18px; font-size: 12px;
      font-family: 'DM Mono', monospace;
      z-index: 300;
      opacity: 0; transform: translateY(8px);
      transition: all 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <div class="logo">RC</div>
    <div class="header-info">
      <h1>Ranking Comercial</h1>
      <p id="last-update">Carregando...</p>
    </div>
  </div>
  <div class="header-right">
    <div class="live-pill"><div class="live-dot"></div>Ao vivo</div>
    <button class="btn-metas" onclick="openModal()">⚙ Metas</button>
  </div>
</header>

<!-- GRID -->
<div class="grid">

  <!-- Ranking Mensal -->
  <div class="panel">
    <div class="panel-eyebrow">Ranking Mensal</div>
    <div class="panel-title">Top Vendedores</div>
    <div class="podium" id="pod-mensal"></div>
  </div>

  <!-- Ranking Campanha Semanal -->
  <div class="panel">
    <div class="panel-eyebrow">Campanha Semanal</div>
    <div class="panel-title">Maiores Entradas</div>
    <div class="podium" id="pod-semanal"></div>
  </div>

  <!-- Ranking Campanha Mensal (equipes) -->
  <div class="panel">
    <div class="panel-eyebrow">Campanha Mensal</div>
    <div class="panel-title">Top Equipes</div>
    <div class="podium" id="pod-equipes"></div>
  </div>

  <!-- Performance -->
  <div class="panel">
    <div class="panel-eyebrow">Performance</div>
    <div class="panel-title">Progresso das Metas</div>
    <div class="progress-grid" id="progress-wrap"></div>
  </div>

</div>

<!-- MODAL METAS -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title">Definir Metas</div>
    <div class="modal-desc">As metas ficam centralizadas e valem para todos os dispositivos.</div>
    <div class="field">
      <label>Meta de Vendas Mensais (R$)</label>
      <input type="number" id="inp-vendas" placeholder="Ex: 300000">
    </div>
    <div class="field">
      <label>Meta de Entradas Semanais (R$)</label>
      <input type="number" id="inp-entradas" placeholder="Ex: 60000">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" id="btn-save" onclick="saveMetas()">Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════
   CONFIG — altere conforme seu deploy
   ═══════════════════════════════════════════════════ */
const API = {
  // Rota relativa funciona tanto local quanto em produção na Vercel
  sheets: "/api/sheets",
  metas:  "/api/metas",
};

/* IDs de aba do Google Sheets (gid=)
   Para descobrir: abra a aba na planilha → veja a URL → #gid=NÚMERO
   Exemplo: https://docs.google.com/spreadsheets/d/SEU_ID/edit#gid=0
*/
const GID = {
  mensal:  "0",   // ← substitua pelo gid real da aba Ranking Mensal
  semanal: "0",   // ← substitua pelo gid real da aba Campanha Semanal
  equipes: "0",   // ← substitua pelo gid real da aba Campanha Mensal
};

/* Índices de coluna no CSV (0-based) de cada aba
   Ajuste conforme as colunas reais da sua planilha publicada */
const COLS = {
  mensal:  { nome: 0, vendas: 1, validos: 2, posicao: 3 },
  semanal: { equipe: 0, vendas: 1, entrada: 2, sucesso: 3, posicao: 4 },
  equipes: { equipe: 0, vendas: 1, validadas: 2, posicao: 3 },
};

/* ═══════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════ */
let metas = { meta_vendas: 0, meta_entradas: 0, meta_equipes: 0 };
let dados = { mensal: [], semanal: [], equipes: [] };
let totais = { vendas: 0, entradas: 0 }; // totais calculados de TODOS os registros do CSV

/* ═══════════════════════════════════════════════════
   FETCH SHEETS
   ══════════════════════════════════════════════════ */

// 1. Busca os dados da planilha via API (que você já tem no HTML)
// 2. Parseia o CSV usando sua lógica de parseUnicaAba (ajustada para lidar com colunas dinâmicas)
// 3. Atualiza o estado global "dados" e "totais"
// 4. Atualiza o timestamp de "Última atualização"
// 5. Chama o render() para atualizar a tela
// 6. Repete a cada 30 segundos
async function loadSheets() {
  try {
    // Adicionamos timestamp também na chamada da SUA api para garantir que a Vercel não segure o cache
    const response = await fetch(`/api/sheets?gid=${GID.mensal}&t=${Date.now()}`, {
      cache: 'no-store' // Força o navegador a não usar cache
    });

    const body = await response.json();

    if (body.ok) {
      // Aqui usamos sua lógica de parseUnicaAba que você já tem no HTML
      dados = parseUnicaAba(body.data); 
      
      document.getElementById("last-update").textContent =
        "Atualizado às " + new Date().toLocaleTimeString("pt-BR", { 
          hour: "2-digit", 
          minute: "2-digit", 
          second: "2-digit" // Segundos ajudam a ver se a TV está "viva"
        });
      
      render(); // Chama o render que desenha o pódio e as barras
    }
  } catch (e) {
    console.error("Erro na sincronização:", e);
  }
}

// Inicialização e Loop
function init() {
  loadMetas(); // Carrega metas do Supabase
  loadSheets(); // Primeira carga
  
  // Loop de 30 segundos
  setInterval(loadSheets, 30000);
}

init();

/* ═══════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════ */
async function init() {
  await Promise.all([loadMetas(), loadSheets()]);
  render();
  // Atualiza planilha a cada 30 segundos
  setInterval(async () => { await loadSheets(); render(); }, 30_000);
}

/* ═══════════════════════════════════════════════════
   FETCH METAS
   ═══════════════════════════════════════════════════ */
async function loadMetas() {
  try {
    const res  = await fetch(API.metas);
    const body = await res.json();
    if (body.ok) metas = body.data;
  } catch (e) {
    console.warn("Metas indisponíveis, usando padrão:", e);
  }
}

/* ═══════════════════════════════════════════════════
   FETCH SHEETS
   ═══════════════════════════════════════════════════ */
async function fetchAba(gid) {
  const res  = await fetch(`${API.sheets}?gid=${gid}`);
  const body = await res.json();
  return body.ok ? body.data : [];
}

async function loadSheets() {
  try {
    /* Se todas as abas tiverem o mesmo gid, busca uma vez só */
    if (GID.mensal === GID.semanal && GID.semanal === GID.equipes) {
      const raw = await fetchAba(GID.mensal);
      dados = parseUnicaAba(raw);
    } else {
      const [rawMensal, rawSemanal, rawEquipes] = await Promise.all([
        fetchAba(GID.mensal),
        fetchAba(GID.semanal),
        fetchAba(GID.equipes),
      ]);
      dados.mensal  = parseMensal(rawMensal);
      dados.semanal = parseSemanal(rawSemanal);
      dados.equipes = parseEquipes(rawEquipes);
    }

    document.getElementById("last-update").textContent =
      "Atualizado às " + new Date().toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
  } catch (e) {
    console.error("Erro ao carregar planilha:", e);
  }
}

/* ── parsers ── */

/*
  O CSV do Google Sheets usa a linha 1 como cabeçalho.
  Quando há múltiplas tabelas side-by-side na mesma aba,
  o CSV exporta TODAS as colunas em cada linha — os cabeçalhos
  duplicados ganham sufixo automático (_1, _2...).

  Estratégia: inspecionar as chaves reais do CSV e localizar
  cada coluna pelo nome (case-insensitive, busca parcial).
*/

/* Encontra a chave real num objeto que contém o texto buscado */
function findKey(keys, search) {
  const s = search.toLowerCase();
  return keys.find(k => k.toLowerCase().includes(s)) ?? null;
}

/* Caso tudo esteja na mesma aba "Ranking" (como no print) */
function parseUnicaAba(rows) {
  if (!rows || rows.length === 0) return { mensal: [], semanal: [], equipes: [] };

  const keys = Object.keys(rows[0]);
  
  // Limpeza de dados nulos ou vazios
  const clean = rows.filter(r => 
    Object.values(r).some(v => v && v.trim() !== "" && v !== "#N/D")
  );

  /* 1. RANKING MENSAL - Atualizado conforme imagem */
  const kNome = findKey(keys, "vendedor");      // Busca "Vendedor"
  const kTotais = findKey(keys, "valores totais"); // Busca "Valores totais"
  const kPontos = findKey(keys, "pontos");      // Busca "Pontos" (Quantidade)

  const mensal = clean
    .map(r => ({
      nome:    r[kNome]?.trim() || "—",
      vendas:  Number(r[kPontos]) || 0,         // Agora usa a coluna Pontos
      validos: parseMoeda(r[kTotais]),          // Agora usa Valores totais
    }))
    .filter(r => r.validos > 0)
    .sort((a, b) => b.validos - a.validos)      // Ordena pelo R$ total
    .slice(0, 3);

  /* 2. RANKING CAMPANHA MENSAL (EQUIPES) */
  const equipeCols = keys.filter(k => k.toLowerCase().includes("equipe"));
  const kEquipeMensal = equipeCols[0];
  // Captura a coluna exata de "Vendas" para as equipes
  const kVendasBrutas = keys.find(k => k.toLowerCase() === "vendas");

  const equipes = clean
    .map(r => ({
      equipe:    r[kEquipeMensal]?.trim() || "—",
      vendas:    parseMoeda(r[kVendasBrutas]), 
    }))
    .filter(r => r.vendas > 0)
    .sort((a, b) => b.vendas - a.vendas) // Ordenação por vendas brutas
    .slice(0, 3);

  /* 3. RANKING CAMPANHA SEMANAL */
  const kEquipeSemanal = equipeCols[1] || equipeCols[0];
  const kEntrada = findKey(keys, "entrada");
  const kSucesso = findKey(keys, "sucesso");

  const semanal = clean
    .map(r => ({
      equipe:  r[kEquipeSemanal]?.trim() || "—",
      entrada: parseMoeda(r[kEntrada]),
      sucesso: (r[kSucesso] ?? "").trim(),
    }))
    .filter(r => r.entrada > 0)
    .sort((a, b) => b.entrada - a.entrada)
    .slice(0, 3);

  /* CÁLCULO DE TOTAIS PARA AS BARRAS DE PERFORMANCE */
  // Soma os "Valores totais" de todos os vendedores para a meta de vendas
  totais.vendas = clean.reduce((s, r) => s + parseMoeda(r[kTotais]), 0);
  totais.entradas = clean.reduce((s, r) => s + parseMoeda(r[kEntrada]), 0);

  return { mensal, semanal, equipes };
}

/* Converte "R$ 39.000,00" → 39000 */
function parseMoeda(v) {
  if (!v) return 0;
  return Number(String(v).replace(/[R$\s.]/g, "").replace(",", ".")) || 0;
}

/* ═══════════════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════════════ */
function render() {
  renderPodium("pod-mensal",  dados.mensal,  "mensal");
  renderPodium("pod-semanal", dados.semanal, "semanal");
  renderPodium("pod-equipes", dados.equipes, "equipes");
  renderProgress();
}

const RANK_LABELS = ["#1", "#2", "#3"];
const RANK_ORDER  = [1, 0, 2]; // posição visual: 2°, 1°, 3°

function renderPodium(id, items, tipo) {
  const el = document.getElementById(id);
  if (!items || items.length === 0) {
    el.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:24px;font-size:12px;font-family:'DM Mono',monospace">Sem dados</div>`;
    return;
  }

  /* Reordena visualmente: 2°, 1°, 3° */
  const ordered = [items[1], items[0], items[2]].filter(Boolean);
  const rankClass = ["rank-2", "rank-1", "rank-3"];

  el.innerHTML = ordered.map((item, vi) => {
    const rClass = rankClass[vi];
    const badge  = vi === 1 ? "#1" : vi === 0 ? "#2" : "#3";
    const initials = (item.nome || item.equipe || "?").split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();
    const label  = item.nome || item.equipe || "—";
    let valor, sublabel;

    if (tipo === "mensal") {
      valor    = fmt(item.validos);
      sublabel = `${item.vendas} vendas`;
    } else if (tipo === "semanal") {
      valor    = fmt(item.entrada);
      sublabel = item.sucesso === "Sim" ? "✓ Meta atingida" : "Em progresso";
    } else {
      // Ajuste para Top Equipes: usa vendas e remove o texto "total"
      valor    = fmt(item.vendas);
      sublabel = ""; 
    }

    return `
      <div class="p-card ${rClass}">
        <span class="p-badge">${badge}</span>
        <div class="p-avatar">${initials}</div>
        <div class="p-name">${label}</div>
        <div class="p-value">${valor}</div>
        <div class="p-sublabel">${sublabel}</div>
      </div>`;
  }).join("");
}

function renderProgress() {
  const wrap = document.getElementById("progress-wrap");

  const items = [
    { label: "Vendas Mensais",    atual: totais.vendas,   meta: metas.meta_vendas,   cor: "c-gold" },
    { label: "Entradas Semanais", atual: totais.entradas, meta: metas.meta_entradas, cor: "c-blue" },
  ];

  wrap.innerHTML = items.map(({ label, atual, meta, cor }) => {
    const pct  = meta > 0 ? Math.min(100, Math.round((atual / meta) * 100)) : 0;
    const vals = meta > 0
      ? `${fmt(atual)} / ${fmt(meta)}`
      : `${fmt(atual)} — meta não definida`;

    return `
      <div class="prog-item">
        <div class="prog-head">
          <span class="prog-label">${label}</span>
          <div class="prog-right">
            <div class="prog-pct ${cor}">${pct}%</div>
            <div class="prog-vals">${vals}</div>
          </div>
        </div>
        <div class="prog-track">
          <div class="prog-fill ${cor}" style="width:${pct}%"></div>
        </div>
      </div>`;
  }).join("");
}

/* ═══════════════════════════════════════════════════
   MODAL
   ═══════════════════════════════════════════════════ */
function openModal() {
  document.getElementById("inp-vendas").value   = metas.meta_vendas   || "";
  document.getElementById("inp-entradas").value = metas.meta_entradas || "";
  document.getElementById("overlay").classList.add("open");
}
function closeModal() {
  document.getElementById("overlay").classList.remove("open");
}

document.getElementById("overlay").addEventListener("click", e => {
  if (e.target === e.currentTarget) closeModal();
});

async function saveMetas() {
  const btn = document.getElementById("btn-save");
  btn.disabled = true;
  btn.textContent = "Salvando...";

  const payload = {
    meta_vendas:   Number(document.getElementById("inp-vendas").value)   || 0,
    meta_entradas: Number(document.getElementById("inp-entradas").value) || 0,
    meta_equipes:  0,
  };

  try {
    const res  = await fetch(API.metas, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    const body = await res.json();
    if (!body.ok) throw new Error(body.error);

    metas = payload;
    closeModal();
    renderProgress();
    showToast("✓ Metas salvas para todos os dispositivos");
  } catch (e) {
    showToast("✗ Erro ao salvar: " + e.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = "Salvar";
  }
}

/* ═══════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════ */
function fmt(v) {
  return (v || 0).toLocaleString("pt-BR", { style: "currency", currency: "BRL", minimumFractionDigits: 0 });
}

function showToast(msg, isError = false) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.borderColor = isError ? "rgba(239,68,68,0.3)" : "rgba(34,197,94,0.3)";
  t.style.color = isError ? "#ef4444" : "var(--green)";
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}

/* ═══════════════════════════════════════════════════
   BOOT
   ═══════════════════════════════════════════════════ */
init();
</script>
